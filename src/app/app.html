<div class="app-shell">
    <app-header></app-header>
    <app-alert></app-alert>

    @if (userStore.isGuest()) {
        <app-nn-guest-banner
            [hoursRemaining]="userStore.guestSessionRemainingHours()"
            (upgradeRequested)="navigateToSignUp()"
        />
    }

    @if (globalStore.isAppLoading()) {
        <app-nn-global-loader></app-nn-global-loader>
    }

    <main class="app-main">
        <router-outlet></router-outlet>
    </main>

    <app-footer class="main__footer"></app-footer>
</div>
