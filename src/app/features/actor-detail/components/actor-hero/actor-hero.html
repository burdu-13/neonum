<header class="actor-hero">
    <div class="actor-hero__frame">
        <div class="actor-hero__layout">
            <div class="actor-hero__info">
                @if (isLoading()) {
                    <app-skeleton
                        width="60%"
                        height="7rem"
                        style="margin-bottom: 3.2rem; display: block"
                    />
                    <app-skeleton
                        width="100%"
                        height="1.8rem"
                        style="margin-bottom: 1.2rem; display: block"
                    />
                    <app-skeleton
                        width="95%"
                        height="1.8rem"
                        style="margin-bottom: 1.2rem; display: block"
                    />
                    <app-skeleton
                        width="80%"
                        height="1.8rem"
                        style="display: block"
                    />
                } @else {
                    <h1 class="actor-hero__name">{{ actor()?.name }}</h1>

                    <div class="actor-hero__biography">
                        <p>{{ actor()?.biography || 'Biography not available.' }}</p>
                    </div>
                }
            </div>

            <figure class="actor-hero__portrait">
                @if (isLoading()) {
                    <app-skeleton
                        width="100%"
                        height="100%"
                        radius="3.2rem"
                    />
                } @else if (profileUrl()) {
                    <img
                        [src]="profileUrl()"
                        [alt]="actor()?.name"
                    />
                }
            </figure>
        </div>
    </div>
</header>
