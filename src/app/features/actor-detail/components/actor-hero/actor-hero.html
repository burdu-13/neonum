<header class="actor-hero">
    <div class="actor-hero__frame">
        <div class="actor-hero__grid">
            <figure class="actor-hero__portrait">
                @if (isLoading()) {
                    <app-skeleton
                        width="100%"
                        height="100%"
                        radius="1.6rem"
                    />
                } @else if (profileUrl()) {
                    <img
                        [src]="profileUrl()"
                        [alt]="actor()?.name"
                    />
                }
            </figure>

            <div class="actor-hero__info">
                @if (isLoading()) {
                    <app-skeleton
                        width="60%"
                        height="6.4rem"
                        style="margin-bottom: 2.4rem; display: block"
                    />
                    <div class="actor-hero__bio">
                        <app-skeleton
                            width="100%"
                            height="1.8rem"
                            style="margin-bottom: 0.8rem; display: block"
                        />
                        <app-skeleton
                            width="95%"
                            height="1.8rem"
                            style="margin-bottom: 0.8rem; display: block"
                        />
                        <app-skeleton
                            width="80%"
                            height="1.8rem"
                            style="display: block"
                        />
                    </div>
                } @else {
                    <h1 class="actor-hero__name">{{ actor()?.name }}</h1>
                    <div class="actor-hero__bio">
                        <h3>Biography</h3>
                        <p>
                            {{
                                actor()?.biography ||
                                    'No biological data available in the mainframe.'
                            }}
                        </p>
                    </div>
                }
            </div>
        </div>
    </div>
</header>
