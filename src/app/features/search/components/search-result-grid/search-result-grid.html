<section class="results-section">
    <h2 class="section-title">{{ title() }}</h2>

    @if (type() === 'person') {
        <app-cast-grid [cast]="actors()" />
    } @else {
        <div class="results-grid">
            @for (item of displayItems(); track item.id) {
                <app-movie-card [movie]="item" />
            }
        </div>
    }
</section>
