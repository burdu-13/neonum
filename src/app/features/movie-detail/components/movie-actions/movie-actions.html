@let m = movie();
@if (m) {
    <div class="movie-actions">
        @let isWatchlisted = watchlistIds().includes(m.id);
        @let isFavorited = favoriteIds().includes(m.id);

        <app-nn-button
            [label]="isWatchlisted ? 'In Watchlist' : 'Watchlist'"
            [icon]="isWatchlisted ? 'bookmark' : 'bookmark_border'"
            [isActive]="isWatchlisted"
            (clicked)="toggleWatchlist.emit({ id: m.id, status: !isWatchlisted })"
        />

        <app-nn-button
            [label]="isFavorited ? 'Favorite' : 'Mark Favorite'"
            [icon]="isFavorited ? 'favorite' : 'favorite_border'"
            [isActive]="isFavorited"
            variant="danger"
            (clicked)="toggleFavorite.emit({ id: m.id, status: !isFavorited })"
        />

        @if (hasTrailer()) {
            <app-nn-button
                label="Watch Trailer"
                icon="play_arrow"
                variant="primary"
                (clicked)="openTrailer.emit()"
            />
        }
    </div>
}
