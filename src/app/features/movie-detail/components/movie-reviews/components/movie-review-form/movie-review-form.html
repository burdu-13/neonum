<div class="review-form">
    <app-nn-rating
        [value]="rating"
        (valueChange)="rating = $event"
    />

    <mat-form-field
        appearance="outline"
        class="review-form__field"
    >
        <mat-label>Share your cinematic perspective...</mat-label>
        <textarea
            matInput
            [(ngModel)]="reviewContent"
            rows="6"
            placeholder="Write your assessment here..."
            class="review-form__textarea"
        ></textarea>
    </mat-form-field>

    <div class="review-form__actions">
        <app-nn-button
            label="Submit Assessment"
            variant="primary"
            [disabled]="!reviewContent || rating === 0"
            (clicked)="submit.emit({ content: reviewContent, rating: rating })"
        />
    </div>
</div>
