<section class="reviews">
    <h2 class="reviews__title">Audience Assessments</h2>

    <div class="reviews__grid">
        @for (review of reviews(); track review.id) {
            <article class="review-card">
                <header class="review-card__header">
                    <div class="review-card__user">
                        <img
                            [src]="
                                review.author_details.avatar_path
                                    ? 'https://image.tmdb.org/t/p/w150' +
                                      review.author_details.avatar_path
                                    : 'assets/icons/user-placeholder.svg'
                            "
                            [alt]="review.author"
                            class="review-card__avatar"
                        />
                        <div class="review-card__info">
                            <span class="review-card__author">{{ review.author }}</span>
                            <span class="review-card__date">
                                {{ review.created_at | date: 'mediumDate' }}
                            </span>
                        </div>
                    </div>
                    @if (review.author_details.rating) {
                        <app-meta-badge
                            [text]="review.author_details.rating.toString()"
                            icon="star"
                            [highlight]="true"
                        />
                    }
                </header>
                <div class="review-card__content">
                    <p>{{ review.content }}</p>
                </div>
            </article>
        } @empty {
            <div class="reviews__empty">
                <p>No critical assessments found for this asset.</p>
            </div>
        }
    </div>
</section>
