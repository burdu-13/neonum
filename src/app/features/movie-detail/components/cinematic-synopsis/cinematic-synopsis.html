<article class="synopsis">
    @if (isLoading()) {
        <app-skeleton
            width="30%"
            height="2.8rem"
            style="margin-bottom: 2.4rem; display: block"
        />
        <app-skeleton
            width="100%"
            height="1.6rem"
            style="margin-bottom: 0.8rem; display: block"
        />
        <app-skeleton
            width="95%"
            height="1.6rem"
            style="margin-bottom: 0.8rem; display: block"
        />
        <app-skeleton
            width="60%"
            height="1.6rem"
            style="display: block"
        />
    } @else {
        <h2>The Synopsis</h2>
        <p>{{ overview() || 'No transmission data available for this sector.' }}</p>
    }
</article>
