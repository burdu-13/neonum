<article class="synopsis">
    <div class="synopsis__header">
        <span class="synopsis__label">The Narrative</span>
        <h2 class="synopsis__title">Synopsis</h2>
    </div>

    @if (isLoading()) {
        <div class="synopsis__skeleton">
            <app-skeleton
                width="100%"
                height="1.8rem"
                style="margin-bottom: 1.2rem; display: block"
            />
            <app-skeleton
                width="95%"
                height="1.8rem"
                style="margin-bottom: 1.2rem; display: block"
            />
            <app-skeleton
                width="60%"
                height="1.8rem"
                style="display: block"
            />
        </div>
    } @else {
        <p class="synopsis__text">
            {{ overview() || 'No transmission data available for this sector.' }}
        </p>
    }
</article>
