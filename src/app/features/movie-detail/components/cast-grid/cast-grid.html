<section
    class="cast-section"
    aria-labelledby="cast-heading"
>
    <h2 id="cast-heading">Leading Cast</h2>
    <div class="cast-grid">
        @for (actor of cast(); track actor.id; let i = $index) {
            <figure
                class="cast-card"
                [routerLink]="['/actor', actor.id]"
                tabindex="0"
                role="link"
            >
                @if (actor.profile_path) {
                    <div class="cast-avatar-wrapper">
                        <img
                            [ngSrc]="actor.profile_path"
                            [alt]="actor.name"
                            fill
                            class="cast-avatar"
                            sizes="(max-width: 768px) 25vw, 10vw"
                            [priority]="i < 4"
                        />
                    </div>
                } @else {
                    <div
                        class="cast-avatar-fallback"
                        aria-hidden="true"
                    >
                        <mat-icon>person</mat-icon>
                    </div>
                }
                <figcaption class="cast-caption">
                    <span class="actor-name">{{ actor.name }}</span>
                    <span class="character-name">{{ actor.character }}</span>
                </figcaption>
            </figure>
        }
    </div>
</section>
