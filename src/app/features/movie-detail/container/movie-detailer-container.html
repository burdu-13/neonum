@let movie = movieStore.selectedMovie();
@let isLoading = movieStore.isLoading();

<main class="detail-gallery">
    <app-movie-hero
        [displayData]="heroDisplay()"
        [isLoading]="isLoading"
    >
        <app-movie-actions
            actions
            [movie]="movie"
            [watchlistIds]="movieStore.watchlistIds()"
            [favoriteIds]="movieStore.favoriteIds()"
            [hasTrailer]="!!trailerKey()"
            (toggleWatchlist)="movieStore.toggleWatchlist($event)"
            (toggleFavorite)="movieStore.toggleFavorite($event)"
            (openTrailer)="isTrailerOpen.set(true)"
        />
    </app-movie-hero>

    <div class="detail-gallery__body">
        <article class="detail-gallery__body__section">
            @if (isLoading) {
                <app-skeleton
                    width="30%"
                    height="2.8rem"
                    style="margin-bottom: 2.4rem; display: block"
                />
                <app-skeleton
                    width="100%"
                    height="1.6rem"
                    style="margin-bottom: 0.8rem; display: block"
                />
                <app-skeleton
                    width="95%"
                    height="1.6rem"
                    style="margin-bottom: 0.8rem; display: block"
                />
                <app-skeleton
                    width="60%"
                    height="1.6rem"
                    style="display: block"
                />
            } @else {
                <h2>The Synopsis</h2>
                <p>{{ movie?.overview }}</p>
            }
        </article>

        @if (isLoading) {
            <section class="detail-gallery__body__section">
                <app-skeleton
                    width="25%"
                    height="2.8rem"
                    style="margin-bottom: 2.4rem; display: block"
                />
                <div class="detail-gallery__body__section__cast-grid">
                    @for (i of [1, 2, 3, 4, 5, 6]; track i) {
                        <div class="detail-gallery__body__section__cast-grid__skeleton">
                            <app-skeleton
                                width="8rem"
                                height="8rem"
                                radius="50%"
                            />
                        </div>
                    }
                </div>
            </section>
        } @else {
            <app-cast-grid [cast]="topCast" />
        }

        @if (!isLoading) {
            <div class="detail-gallery__body__feedback">
                <app-movie-feedback
                    [reviews]="movieStore.processedReviews()"
                    [hasMore]="movieStore.hasMoreReviews()"
                    [isRated]="!!movie?.account_states?.rated"
                    (loadMore)="movieStore.loadMoreReviews()"
                    (submitReview)="handleReviewSubmit($event, movie!.id)"
                />
            </div>
        }
    </div>

    @if (isTrailerOpen()) {
        <app-movie-trailer
            [trailerKey]="trailerKey()!"
            (close)="isTrailerOpen.set(false)"
        />
    }
</main>
