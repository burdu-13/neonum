@let movie = movieStore.selectedMovie();
@let isLoading = movieStore.isLoading();

<main class="detail-gallery">
    <app-movie-hero
        [displayData]="heroDisplay()"
        [isLoading]="isLoading"
    >
        <app-movie-actions
            actions
            [movie]="movie"
            [watchlistIds]="movieStore.watchlistIds()"
            [favoriteIds]="movieStore.favoriteIds()"
            [hasTrailer]="!!trailerKey()"
            (toggleWatchlist)="movieStore.toggleWatchlist($event)"
            (toggleFavorite)="movieStore.toggleFavorite($event)"
            (openTrailer)="isTrailerOpen.set(true)"
        />
    </app-movie-hero>

    <div class="detail-gallery__body">
        <div class="flex flex-col gap-12">
            <app-cinematic-synopsis
                [overview]="movie?.overview"
                [isLoading]="isLoading"
            />

            @if (!isLoading && seasons().length > 0) {
                <app-cinematic-seasons
                    [seasons]="seasons()"
                    (seasonClicked)="onSeasonSelect($event)"
                />

                @if (movieStore.activeSeasonEpisodes().length > 0 || movieStore.isSeasonLoading()) {
                    <app-cinematic-episodes
                        [episodes]="movieStore.activeSeasonEpisodes()"
                        [isLoading]="movieStore.isSeasonLoading()"
                    />
                }
            }
        </div>

        <app-cinematic-cast
            [cast]="topCast"
            [isLoading]="isLoading"
        />

        @if (!isLoading) {
            <div class="detail-gallery__body__feedback">
                <app-movie-feedback
                    [reviews]="movieStore.processedReviews()"
                    [hasMore]="movieStore.hasMoreReviews()"
                    [isRated]="!!movie?.account_states?.rated"
                    (loadMore)="movieStore.loadMoreReviews()"
                    (submitReview)="handleReviewSubmit($event, movie!.id)"
                />
            </div>
        }
    </div>

    @if (isTrailerOpen()) {
        <app-movie-trailer
            [trailerKey]="trailerKey()!"
            (close)="isTrailerOpen.set(false)"
        />
    }
</main>
