<main class="explore">
    <header class="explore__header">
        <div class="nn-container">
            <div class="explore__header-top">
                <div class="explore__title-group">
                    <span class="explore__subtitle">Cinematic Archive</span>
                    <h1 class="explore__title">Explore</h1>
                </div>

                <app-nn-dropdown
                    [options]="[
                        { label: 'Most Popular', value: 'popularity.desc' },
                        { label: 'Newest Releases', value: 'primary_release_date.desc' },
                        { label: 'Top Rated', value: 'vote_average.desc' },
                    ]"
                    [(value)]="sortValue"
                />
            </div>

            <nav class="explore__filters">
                <div class="explore__filters-scroll">
                    @for (genre of exploreStore.genres(); track genre.id) {
                        <app-category-pill
                            [label]="genre.name"
                            [isActive]="
                                !!exploreStore
                                    .filters()
                                    .with_genres?.split(',')
                                    ?.includes(genre.id.toString())
                            "
                            (click)="handleGenreChange(genre.id)"
                        />
                    }
                </div>
            </nav>
        </div>
    </header>

    <div class="nn-container">
        <div class="explore__grid">
            @for (movie of exploreStore.movies(); track movie.id) {
                @defer (on viewport) {
                    <app-movie-card
                        [movie]="movie"
                        class="explore__item"
                        [style.--index]="$index % 20"
                    />
                } @placeholder {
                    <app-skeleton
                        type="card"
                        class="explore__ghost"
                    />
                }
            }

            @if (exploreStore.isLoading()) {
                @for (i of [1, 2, 3, 4]; track $index) {
                    <app-skeleton
                        type="card"
                        class="explore__item explore__item--loading"
                    />
                }
            }
        </div>

        <div
            class="explore__load-trigger"
            appInteractionObserver
            (isIntersecting)="exploreStore.loadNextPage()"
        ></div>
    </div>
</main>
