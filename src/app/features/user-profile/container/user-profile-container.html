<main class="profile-layout">
    <app-profile-hero
        [user]="profileStore.userProfileData()"
        [isOwnProfile]="profileStore.isOwnProfile()"
        [isEditMode]="profileStore.isEditMode()"
        (toggleEdit)="profileStore.toggleEditMode()"
        (updateUsername)="profileStore.updateUsername($event)"
    />

    <div class="profile-content">
        <app-profile-stats
            [watchlistCount]="movieStore.watchlistMovies().length"
            [favoritesCount]="movieStore.favoriteMovies().length"
            [followers]="profileStore.followers()"
            [following]="profileStore.following()"
        />

        <app-movie-shelf
            title="Watchlist"
            [movies]="movieStore.watchlistMovies()"
            [isLoading]="movieStore.isDetailLoading()"
            [isPersonal]="true"
        />

        <app-movie-shelf
            title="Favorites"
            [movies]="movieStore.favoriteMovies()"
            [isLoading]="movieStore.isDetailLoading()"
            [isPersonal]="true"
        />
    </div>
</main>
