<main class="profile">
    @if (!userStore.isLoading()) {
        <header class="profile__header">
            <app-profile-hero [user]="userStore.account()" />
        </header>

        <div class="profile__body">
            <app-profile-stats
                [watchlistCount]="movieStore.watchlistMovies().length"
                [favoritesCount]="movieStore.favoriteMovies().length"
            />

            <section class="profile__section">

                @if (movieStore.watchlistMovies().length > 0 || movieStore.isLoading()) {
                    <app-movie-shelf
                        title="Your Watchlist"
                        [movies]="movieStore.watchlistMovies()"
                        [isLoading]="movieStore.isLoading()"
                        [isPersonal]="true"
                    />
                } @else {
                    <app-nn-empty-state
                        title="Watchlist Empty"
                        description="Explore the archive to curate your personal viewing queue."
                        icon="bookmark_border"
                    />
                }
            </section>

            <section class="profile__section">

                @if (movieStore.favoriteMovies().length > 0 || movieStore.isLoading()) {
                    <app-movie-shelf
                        title="Your Favorites"
                        [movies]="movieStore.favoriteMovies()"
                        [isLoading]="movieStore.isLoading()"
                        [isPersonal]="true"
                    />
                } @else {
                    <app-nn-empty-state
                        title="No Favorites"
                        description="Mark your favorite masterpieces to showcase them here."
                        icon="favorite_border"
                    />
                }
            </section>
        </div>
    } @else {
        <div class="profile__loading">
            <app-skeleton
                height="40rem"
                width="100%"
                radius="4rem"
            />
            <div class="profile__loading-grid">
                <app-skeleton
                    height="16rem"
                    radius="3.2rem"
                />
                <app-skeleton
                    height="16rem"
                    radius="3.2rem"
                />
            </div>
        </div>
    }
</main>
