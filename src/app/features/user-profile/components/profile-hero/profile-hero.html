<header class="hero">
    @if (user()) {
        <div class="hero__avatar-container">
            <div class="hero__avatar-wrapper">
                @if (user()?.avatar?.tmdb?.avatar_path && !hasAvatarError()) {
                    <img
                        [ngSrc]="user()!.avatar!.tmdb!.avatar_path!"
                        class="hero__avatar"
                        [alt]="user()?.username"
                        fill
                        priority
                        (error)="hasAvatarError.set(true)"
                    />
                } @else {
                    <div class="hero__avatar-fallback">
                        {{ user()?.username?.charAt(0) }}
                    </div>
                }
            </div>
            <div class="hero__avatar-glow"></div>
        </div>

        <div class="hero__info">
            <span class="nn-editorial-label">Member Profile</span>
            <h1 class="hero__name">{{ user()?.username }}</h1>
            <p class="hero__status">Member</p>
        </div>
    }
</header>
