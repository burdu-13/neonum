<section class="login">
    <div class="login__card">
        <header class="login__header">
            <span class="login__label">Cinematic Archive</span>
            <h1 class="login__title">
                Sign In
                <span>.</span>
            </h1>
            <p class="login__description">
                Continue your exploration through curated masterpieces.
            </p>
        </header>

        <form
            [formGroup]="loginForm"
            (ngSubmit)="onLogin()"
            class="login__form"
        >
            <mat-form-field
                appearance="outline"
                class="login__field"
            >
                <mat-label>Username</mat-label>
                <input
                    matInput
                    formControlName="username"
                />
                <mat-icon matSuffix>person</mat-icon>
            </mat-form-field>

            <mat-form-field
                appearance="outline"
                class="login__field"
            >
                <mat-label>Password</mat-label>
                <input
                    matInput
                    formControlName="password"
                    type="password"
                />
                <mat-icon matSuffix>lock</mat-icon>
            </mat-form-field>

            <app-nn-button
                label="Log In"
                variant="primary"
                [isLoading]="store.isLoading()"
                [disabled]="loginForm.invalid"
                class="login__submit"
            />
        </form>

        <footer class="login__footer">
            <button
                type="button"
                class="login__action"
                (click)="onGuestLogin()"
            >
                Guest Session
            </button>
            <div class="login__divider"></div>
            <button
                type="button"
                class="login__action"
                (click)="onRegisterNavigate()"
            >
                Create Account
            </button>
        </footer>
    </div>
</section>
