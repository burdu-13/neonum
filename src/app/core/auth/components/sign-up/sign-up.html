<section class="register">
    <div class="register__card">
        <header class="register__header">
            <span class="register__label">Membership</span>
            <h1 class="register__title">
                Join
                <span>.</span>
            </h1>
            <p class="register__description">
                Neonum utilizes the global TMDB registry for secure authentication.
            </p>
        </header>

        <div class="register__content">
            <p class="register__info">
                To protect your privacy, we do not store local credentials. Your cinematic profile
                is managed through the official registry portal.
            </p>
        </div>

        <app-nn-button
            label="Open Registry Portal"
            variant="primary"
            class="register__submit"
            (clicked)="onRegister()"
        />

        <footer class="register__footer">
            <button
                type="button"
                class="register__action"
                (click)="onBackToLogin()"
            >
                Return to Login
            </button>
        </footer>
    </div>
</section>
