<footer
    class="footer"
    aria-label="Site footer"
>
    <div class="footer__wrapper">
        <a
            routerLink="/dashboard"
            class="footer__brand"
            aria-label="Neonum Homepage"
        >
            <span class="footer__brand__text">NEONUM</span>
            <span class="footer__brand__year">&copy; {{ currentYear }}</span>
        </a>

        <div class="footer__socials">
            <a
                href="https://github.com"
                target="_blank"
                rel="noopener noreferrer"
                class="footer__socials__link"
                aria-label="Neonum GitHub Repository"
            >
                <mat-icon class="footer__socials__icon">code</mat-icon>
            </a>
            <a
                href="https://twitter.com"
                target="_blank"
                rel="noopener noreferrer"
                class="footer__socials__link"
                aria-label="Neonum Twitter Profile"
            >
                <mat-icon class="footer__socials__icon">share</mat-icon>
            </a>
        </div>
    </div>
</footer>
