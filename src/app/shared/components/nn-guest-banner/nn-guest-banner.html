<aside
    class="guest-banner"
    role="alert"
>
    <div class="nn-container">
        <div class="guest-banner__content">
            <div class="guest-banner__message">
                <span class="guest-banner__tag">Guest Session</span>
                <p class="guest-banner__text">
                    Your temporary access will be deactivated in
                    <strong>{{ hoursRemaining() }} hours</strong>
                    . Create an account to preserve your archive.
                </p>
            </div>

            <div class="guest-banner__actions">
                <app-nn-button
                    label="Join Neonum"
                    variant="primary"
                    (clicked)="upgradeRequested.emit()"
                />

                <app-nn-button
                    label="End Session"
                    variant="surface"
                    (clicked)="onEndSession()"
                />
            </div>
        </div>
    </div>
</aside>
