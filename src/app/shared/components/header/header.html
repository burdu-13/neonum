<header class="header">
    <div class="header__frame">
        <div
            class="header__brand"
            routerLink="/"
        >
            <span class="header__brand-text">NEONUM</span>
        </div>

        <nav class="header__nav">
            <ul class="header__nav-list">
                @if (store.isAuthenticated()) {
                    <li class="header__nav-item">
                        <a
                            routerLink="/dashboard"
                            routerLinkActive="active"
                            class="header__nav-link"
                        >
                            DASHBOARD
                        </a>
                    </li>
                }
                <li class="header__nav-item">
                    <a
                        routerLink="/movies"
                        routerLinkActive="active"
                        class="header__nav-link"
                    >
                        MOVIES
                    </a>
                </li>
                <li class="header__nav-item">
                    <a
                        routerLink="/tv-shows"
                        routerLinkActive="active"
                        class="header__nav-link"
                    >
                        SERIES
                    </a>
                </li>
                @if (store.isAuthenticated() && store.account()) {
                    <li class="header__nav-item">
                        <a
                            routerLink="/watchlist"
                            routerLinkActive="active"
                            class="header__nav-link"
                        >
                            WATCHLIST
                        </a>
                    </li>
                }
            </ul>
        </nav>

        <div class="header__meta">
            <button
                class="header__search-trigger"
                aria-label="Search Archive"
            >
                <mat-icon>search</mat-icon>
            </button>

            <div class="header__auth-slot">
                @if (store.isAuthenticated()) {
                    <div class="header__profile-card">
                        <span class="profile-name">
                            {{ store.account()?.username ?? 'GUEST' }}
                        </span>
                        <button
                            (click)="store.logout()"
                            class="logout-action"
                            title="Terminate Session"
                        >
                            <mat-icon class="logout-action__icon">power_settings_new</mat-icon>
                        </button>
                    </div>
                } @else {
                    <button
                        class="login-trigger"
                        routerLink="/auth/login"
                    >
                        LOGIN
                    </button>
                }
            </div>
        </div>
    </div>
</header>
